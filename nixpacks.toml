[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "tesseract", "poppler_utils"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT"
